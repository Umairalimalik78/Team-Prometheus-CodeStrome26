name: habitat_app
description: A minimal Habitat Flutter scaffold (hackathon starter)
publish_to: none
version: 0.1.0
environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  google_fonts: ^6.2.1
  flutter_riverpod: ^2.5.1
  supabase_flutter: ^2.5.0
  go_router: ^13.0.0
  flutter_local_notifications: ^17.2.2
  dio: ^5.4.3
  shared_preferences: ^2.2.3
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
